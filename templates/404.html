{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada – Código de Eventos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
    <script>if (localStorage.getItem('darkMode') === 'enabled') { document.documentElement.classList.add('dark'); }</script>
    <style>
        html.dark body { background-color: #111111; color: #f0f0f0; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#111111] font-sans min-h-screen flex items-center justify-center">
    <div class="text-center px-6 py-16 max-w-md mx-auto">

        <!-- Icon -->
        <div class="flex justify-center mb-8">
            <div class="w-20 h-20 bg-gray-100 dark:bg-[#1c1c1c] rounded-2xl flex items-center justify-center">
                <svg class="w-10 h-10 text-gray-400 dark:text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>

        <!-- Error code -->
        <p class="text-7xl font-bold text-gray-900 dark:text-white tracking-tight mb-2">404</p>

        <!-- Title -->
        <h1 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-3">
            Página não encontrada
        </h1>

        <!-- Description -->
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-8 leading-relaxed">
            A página que você está procurando não existe ou foi movida.
            Verifique o endereço digitado ou volte ao início.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="/dashboard/"
               class="w-full sm:w-auto px-6 py-2.5 bg-black dark:bg-white text-white dark:text-black text-sm font-medium rounded-lg hover:bg-gray-800 dark:hover:bg-gray-100 transition-colors">
                Ir para o Dashboard
            </a>
            <button onclick="history.back()"
                class="w-full sm:w-auto px-6 py-2.5 bg-white dark:bg-[#1c1c1c] border border-gray-200 dark:border-[#2e2e2e] text-gray-700 dark:text-gray-300 text-sm font-medium rounded-lg hover:bg-gray-50 dark:hover:bg-[#2a2a2a] transition-colors">
                ← Voltar
            </button>
        </div>

    </div>
</body>
</html>
